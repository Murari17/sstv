<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SSTV Web Emulator</title>
  <link rel="stylesheet" href="static/styles.css">
</head>
<body>
  <header>
    <h1>SSTV Web Emulator</h1>
    <p class="note">Audio-only SSTV encoder/decoder emulator. Does not transmit RF.</p>
  </header>
  <main>
    <section class="controls">
      <div class="col">
        <h2>Encoder</h2>
        <label>Upload image (PNG/JPEG): <input id="imgFile" type="file" accept="image/*"></label>
        <canvas id="previewCanvas" width="320" height="256"></canvas>
        <div class="buttons">
          <button id="encodeBtn">Encode</button>
          <button id="playBtn" disabled>Play</button>
          <button id="downloadWavBtn" disabled>Download WAV</button>
        </div>
      </div>
      <div class="col">
        <h2>Decoder</h2>
        <label>Upload SSTV audio (WAV): <input id="audioFile" type="file" accept="audio/*"></label>
        <pre id="decodeDebug">Decoder debug: idle</pre>
        <canvas id="decodedCanvas" width="320" height="256"></canvas>
      </div>
    </section>
  </main>
  <footer>
    <p>This tool emulates SSTV audio only. Do not transmit on air without valid licenses.</p>
  </footer>
  <script src="static/app.js?v=20260317-06"></script>
</body>
</html>
